<head>
    <script src="officeParserBundle@5.2.1.js"></script>
    
    
</head>
<body>

    Import file here:
    <input type="file" id="file-input" multiple />
    <button onclick="processFiles()" id="file-button">Import</button>

    <script lang="javascript">
        let button = document.getElementById('file-button');
        let files = document.getElementById('file-input');
        
        async function processFiles(){
            let files = document.getElementById('file-input');
            let fileList = files.files[0];

            for(let file of [fileList]){
                try {
                    // Your configuration options for officeParser
                    const config = {
                        outputErrorToConsole: true,
                        newlineDelimiter: '\n',
                        ignoreNotes: false,
                        putNotesAtLast: false
                    };

                    const arrayBuffer = await file.arrayBuffer();
                    console.log(arrayBuffer);
                    const result = await officeParser.parseOfficeAsync(arrayBuffer, config);
                    // result contains the extracted text.
                    console.log(result);
                }
                catch (error) {
                    // Handle error
                    console.warn(error)
                }
            }
            
        }
    </script>
</body>
