name: Deploy Svelte App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Svelte app
        run: npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@v8
        with:
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          path: "build/"
          remote_path: "/var/www/${{ secrets.APP_FOLDER }}/"
          switches: "-az --delete"
          pre_cmd: |
            sudo mkdir -p /var/www/${{ secrets.APP_FOLDER }}
            sudo chown deploy:www-data /var/www/${{ secrets.APP_FOLDER }}
            sudo chmod 775 /var/www/${{ secrets.APP_FOLDER }}

